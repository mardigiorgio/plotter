<div id="app">
  <div id="panel">
    <div id="topbar">
      <div id="brand">Plotter <span>3D</span></div>
      <button id="addrow" title="add expression">+</button>
      <button id="themebtn" title="switch light / dark">&#9680;</button>
      <button id="helpbtn" title="examples &amp; help">?</button>
    </div>
    <div id="rows"><div id="emptyhint" class="hiddenb"></div></div>
    <div id="panelfoot">Click a row&rsquo;s colored circle to hide its plot. <b>?</b> opens the docs.</div>
  </div>
  <div id="view">
    <div id="canvaswrap"></div>
    <div id="viewbtns">
      <button id="dimbtn" title="flat top-down 2D view">2D</button>
      <button id="zoomin" title="zoom window in">+</button>
      <button id="zoomout" title="zoom window out">&minus;</button>
      <button id="zoomhome" title="reset view">&#8962;</button>
      <button id="gsettings" title="window &amp; display settings">&#9881;</button>
    </div>
    <div id="gpanel" class="popover hiddenb"></div>
    <div id="docsdrawer" class="hiddenb">
      <div id="docshead">
        <span>Documentation</span>
        <button id="docsclose" title="close">&times;</button>
      </div>
      <div id="docsbody"></div>
    </div>
  </div>
</div>
